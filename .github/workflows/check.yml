name: pycodestyle check

on: [push, pull_request]

jobs:
  pep8-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Установка зависимостей из requirements.txt
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Предварительная установка pycodestyle
        run: pip install pycodestyle

      - name: Запуск проверки pycodestyle
        run: |
          echo "Запуск проверки PEP-8"
          pycodestyle script.py > pep8_output.txt 2>&1 || true
          output=$(cat pep8_output.txt)
          if [ -n "$output" ]; then
            echo "Обнаружены ошибки PEP-8:"
            cat pep8_output.txt
            exit 1
          else
            echo "Ошибки PEP-8 не обнаружены!"
          fi
      
